ShortDescription: A minimal, distraction-free Markdown editor with live preview, math, diagrams, and an optional AI assistant.
Description: |-
  MarkLite is a fast, minimal, open-source Markdown editor built with Tauri, Rust, and React.
  It renders Markdown beautifully while keeping the raw text one keystroke away — with a
  Reader / Code / Split view, syntax highlighting, KaTeX math, mhchem chemistry equations,
  Mermaid diagrams, slash commands, wikilinks, a command palette, four themes, and an
  optional AI assistant (bring your own OpenAI-compatible model). No account, no telemetry —
  files stay on your machine.
